#
### pacstrap Module
#
# This module installs the base system and then copies files
# into the installation that will be used in the installed system
#

---
# basePackages is an array of package names to pass to pacstrap
#
basePackages:
  - base
  - base-devel
  - linux-cachyos
  - linux-cachyos-headers
  - linux-firmware
  - grub
  - efibootmgr
  - networkmanager
  - sudo
  - nano
  - vim
  # KDE Plasma Desktop
  - plasma-desktop
  - plasma-workspace
  - plasma-nm
  - plasma-pa
  - plasma-integration
  - sddm
  - dolphin
  - konsole
  - kate
  - kcalc
  - spectacle
  - partitionmanager
  - kscreen
  - kinfocenter
  - kde-gtk-config
  - bluedevil
  - breeze-gtk
  - powerdevil
  - plasma-thunderbolt
  - polkit-kde-agent
  # Audio
  - pipewire
  - pipewire-alsa
  - pipewire-jack
  - pipewire-pulse
  - wireplumber
  - alsa-utils
  # Network
  - networkmanager
  - network-manager-applet
  - modemmanager
  - wpa_supplicant
  - iwd
  # Fonts
  - noto-fonts
  - noto-fonts-cjk
  - ttf-dejavu
  - ttf-liberation
  - ttf-opensans
  # System utilities
  - htop
  - neofetch
  - wget
  - curl
  - git
  - unzip
  - zip
  - p7zip
  - rsync
  # File systems
  - btrfs-progs
  - dosfstools
  - e2fsprogs
  - exfatprogs
  - f2fs-tools
  - ntfs-3g
  - xfsprogs
  # Hardware support
  - intel-ucode
  - amd-ucode
  - mesa
  - vulkan-radeon
  - vulkan-intel
  - nvidia-utils
  # VirtualBox guest
  - virtualbox-guest-utils
  # CachyOS specific
  - cachyos-keyring
  - cachyos-mirrorlist

#
# postInstallFiles is an array of file names which will be copied into the system
#
# The paths should be relative to the host and the files will be copied to the
# location in the installed system
#
postInstallFiles:
  - "/etc/pacman.conf"
  - "/etc/default/grub"
  - "/etc/mkinitcpio.conf"
