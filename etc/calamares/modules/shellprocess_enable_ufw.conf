---
# Genesi: override upstream shellprocess_enable_ufw.conf so the job no longer
# depends on /etc/calamares/scripts/enable-ufw existing inside the target.
# We inline the logic here, which eliminates an entire class of failures
# (script missing on live ISO, pacstrap postInstallFiles dropping it, etc.).
#
# Genesi defaults to firewalld, so this is usually a no-op. We still honour
# UFW if a user pulled it in.

dontChroot: false
timeout: 600
script:
    - command: |
        if command -v ufw >/dev/null 2>&1; then
            ufw default deny incoming  || true
            ufw default allow outgoing || true
            ufw --force enable          || true
            systemctl enable ufw.service || true
        else
            echo "ufw not installed, skipping"
        fi
        exit 0

i18n:
    name: "Enable the UFW Firewall as default and allow outgoing but deny incoming"
