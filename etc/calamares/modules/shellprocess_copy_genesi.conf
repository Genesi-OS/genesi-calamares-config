---
# Runs on the LIVE ISO (dontChroot: true), AFTER users module so /home/<user>
# already exists. Copies Genesi branding from the live ISO into the target.
#
# CRITICAL: Calamares substitutes @@ROOT@@ with the target mountpoint. Shell
# variables like ${ROOT} are NOT substituted and expand to empty string,
# which made every cp here a self-copy no-op (target installed with zero
# Genesi branding — stock Plasma).
dontChroot: true
timeout: 3600
script:
 - "cp -rf /usr/share/genesi @@ROOT@@/usr/share/ || true"
 - "cp -rf /usr/share/sddm/themes/genesi @@ROOT@@/usr/share/sddm/themes/ || true"
 - "cp -rf /usr/share/plasma/desktoptheme/genesi-plasma @@ROOT@@/usr/share/plasma/desktoptheme/ || true"
 - "cp -rf /usr/share/plymouth/themes/genesi @@ROOT@@/usr/share/plymouth/themes/ || true"
 - "cp -rf /usr/share/icons/Tela-circle* @@ROOT@@/usr/share/icons/ || true"
 - "cp -rf /usr/share/Kvantum/Genesi @@ROOT@@/usr/share/Kvantum/ || true"
 - "cp -f /usr/share/color-schemes/Genesi* @@ROOT@@/usr/share/color-schemes/ || true"
 - "cp -rf /usr/share/wallpapers/genesi @@ROOT@@/usr/share/wallpapers/ || true"
 - "mkdir -p @@ROOT@@/etc/sddm.conf.d"
 - "cp -f /etc/sddm.conf.d/genesi-theme.conf @@ROOT@@/etc/sddm.conf.d/ || true"
 - "cp -f /etc/os-release @@ROOT@@/etc/ || true"
 - "cp -f /etc/lsb-release @@ROOT@@/etc/ || true"
 - "cp -f /etc/hostname @@ROOT@@/etc/ || true"
 - "cp -f /usr/bin/genesi-* @@ROOT@@/usr/bin/ || true"
 - "cp -f /usr/lib/systemd/system/genesi-* @@ROOT@@/usr/lib/systemd/system/ || true"
 - "cp -f /etc/systemd/system/genesi-* @@ROOT@@/etc/systemd/system/ || true"
 - "cp -f /usr/share/applications/genesi-* @@ROOT@@/usr/share/applications/ || true"
 - "mkdir -p @@ROOT@@/etc/skel"
 # Force SDDM DisplayServer=x11 ONLY when the live ISO is running on a
 # broken Wayland video stack (vmwgfx = VirtualBox unsupported hypervisor,
 # plain vboxvideo, or no DRM driver at all). On real hardware with
 # working KMS (amdgpu, i915, nouveau, nvidia-drm) we keep Wayland default
 # so Plasma 6 features (fractional scaling, HDR, gestures) work.
 - command: |
     mkdir -p @@ROOT@@/etc/sddm.conf.d
     need_x11=0
     if lsmod 2>/dev/null | grep -Ewq '^(vmwgfx|vboxvideo)'; then
         need_x11=1
     elif ! ls /sys/class/drm/card?/device/driver 2>/dev/null \
            | xargs -r -n1 readlink 2>/dev/null \
            | grep -Eq 'amdgpu|i915|nouveau|nvidia|radeon|virtio'; then
         # No recognized KMS driver loaded — safer to fall back to X11.
         need_x11=1
     fi
     if [ "$need_x11" = 1 ]; then
         printf '[General]\nDisplayServer=x11\n' \
             > @@ROOT@@/etc/sddm.conf.d/00-display-server.conf
         echo "[copy_genesi] forced SDDM DisplayServer=x11 (unsupported/missing KMS driver)"
     else
         echo "[copy_genesi] keeping SDDM default (Wayland) — supported KMS driver detected"
     fi
   timeout: 30
 # Klassy is built from source in customize_airootfs.sh and only lands in
 # the live ISO's /usr/lib/qt6/plugins/. Copy every klassy* artifact across
 # the standard Plasma plugin/bin/share trees so the installed system has
 # rounded corners and the Klassy preferences app. (Tracked as future work:
 # ship a proper genesi-klassy PKGBUILD so this isn't needed.)
 - command: |
     find /usr/lib/qt6/plugins \
          /usr/lib/plugins \
          /usr/lib/kf6/krunner \
          /usr/bin \
          /usr/share/applications \
          /usr/share/icons/hicolor \
          /usr/share/kglobalaccel \
          /usr/share/kconf_update \
          /usr/share/dbus-1/services \
          -name '*klassy*' 2>/dev/null \
     | while read -r src; do
         dest="@@ROOT@@${src}"
         mkdir -p "$(dirname "$dest")"
         cp -rf "$src" "$dest" 2>/dev/null || true
     done
     echo "[copy_genesi] klassy artifacts copied (if present on live ISO)"
   timeout: 60
 # System-wide KDE / Plasma defaults: kdedefaults defines which
 # look-and-feel, color scheme, icons, etc. Plasma uses out of the box.
 - "mkdir -p @@ROOT@@/etc/xdg"
 - "cp -rf /etc/xdg/. @@ROOT@@/etc/xdg/ || true"
 # /etc/skel on the live ISO is the canonical user-template; merge it on
 # top of whatever pacstrap installed so future users inherit Genesi
 # plasma configs (.config, .local, etc.).
 - "cp -rf /etc/skel/. @@ROOT@@/etc/skel/ || true"
 # Apply skel-override to every existing user home that Calamares just
 # created (the 'users' module ran in the prior step). chown to the
 # discovered uid so KDE doesn't refuse the files.
 - command: |
     for home in @@ROOT@@/home/*; do
         [ -d "$home" ] || continue
         user=$(basename "$home")
         cp -rf @@ROOT@@/etc/skel/. "$home/" 2>/dev/null || true
         uid=$(awk -F: -v u="$user" '$1==u{print $3}' @@ROOT@@/etc/passwd)
         gid=$(awk -F: -v u="$user" '$1==u{print $4}' @@ROOT@@/etc/passwd)
         [ -n "$uid" ] && [ -n "$gid" ] && chown -R "$uid:$gid" "$home" 2>/dev/null || true
     done
   timeout: 120
 # SDDM drop-ins (theme, autologin, etc.)
 - "mkdir -p @@ROOT@@/etc/sddm.conf.d"
 - "cp -rf /etc/sddm.conf.d/. @@ROOT@@/etc/sddm.conf.d/ || true"
 - "[ -f /etc/sddm.conf ] && cp -f /etc/sddm.conf @@ROOT@@/etc/sddm.conf || true"
 # Default look-and-feel package data
 - "mkdir -p @@ROOT@@/usr/share/plasma/look-and-feel"
 - "cp -rf /usr/share/plasma/look-and-feel/. @@ROOT@@/usr/share/plasma/look-and-feel/ || true"
 - "mkdir -p @@ROOT@@/usr/share/plasma/desktoptheme"
 - "cp -rf /usr/share/plasma/desktoptheme/. @@ROOT@@/usr/share/plasma/desktoptheme/ || true"
 - command: "bash /etc/calamares/scripts/genesi-write-branding.sh"
   timeout: 60
i18n:
 name: "Copying Genesi OS branding and icons to the target system..."
